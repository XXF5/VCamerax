name: Build Android APK

on:
  push:
    branches:[main, master]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub release after build"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

env:
  JAVA_DISTRIBUTION: temurin
  JAVA_VERSION: "17"

jobs:
  # تم حذف خطوة gradle-validation لأن المشروع من صنع AI والملف غير موجود
  
  build:
    name: Build APK (API ${{ matrix.api-level }}, ${{ matrix.build-type }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        api-level: [30, 33, 34]
        build-type:[debug, release]
        include:
          - api-level: 34
            build-type: release
            is_latest: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      # 🌟 هذا هو الحل السحري: جعل سيرفر GitHub ينشئ الملف المفقود تلقائياً
      - name: Generate missing Gradle Wrapper
        run: gradle wrapper

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-api${{ matrix.api-level }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-api${{ matrix.api-level }}-
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Generate CI signing keystore
        if: matrix.build-type == 'release'
        run: |
          mkdir -p app/keystore
          keytool -genkeypair \
            -v \
            -keystore app/keystore/ci-release.jks \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias ci \
            -storepass ci_release_store \
            -keypass ci_release_key \
            -dname "CN=CI, OU=CI, O=DualSpaceOBS, L=Unknown, ST=Unknown, C=US"

      - name: Build ${{ matrix.build-type }} APK (API ${{ matrix.api-level }})
        env:
          SIGNING_STORE_FILE: ../keystore/ci-release.jks
          SIGNING_STORE_PASSWORD: ci_release_store
          SIGNING_KEY_ALIAS: ci
          SIGNING_KEY_PASSWORD: ci_release_key
        run: |
          ./gradlew assemble${{ matrix.build-type == 'debug' && 'Debug' || 'Release' }} \
            -PcompileSdkVersion=${{ matrix.api-level }} \
            -PtargetSdkVersion=${{ matrix.api-level }} \
            --no-daemon \
            --stacktrace

      - name: Prepare APK artifact
        id: artifact
        run: |
          FIND_CMD="find app/build/outputs/apk/${{ matrix.build-type }} -name '*.apk' -type f"
          APK_PATH=$(eval "$FIND_CMD" | head -n1)
          if[ -z "$APK_PATH" ]; then
            echo "ERROR: No APK found for ${{ matrix.build-type }}"
            exit 1
          fi
          APK_NAME=$(basename "$APK_PATH")
          # 🌟 تم إصلاح مشكلة المتغير هنا أيضاً (env.github_sha_short بدلاً من github.sha_short)
          ARTIFACT_NAME="DualSpaceOBS-${{ matrix.build-type }}-api${{ matrix.api-level }}-${{ env.github_sha_short }}.apk"
          cp "$APK_PATH" "$ARTIFACT_NAME"
          echo "path=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          echo "Built: $ARTIFACT_NAME ($APK_NAME)"
        env:
          github_sha_short: ${{ github.sha }}

      - name: Upload ${{ matrix.build-type }} APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DualSpaceOBS-${{ matrix.build-type }}-api${{ matrix.api-level }}
          path: ${{ steps.artifact.outputs.path }}
          retention-days: 30
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      (github.event_name == 'push' || github.event.inputs.create_release == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Extract version from build.gradle
        id: version
        run: |
          GRADLE_FILE="app/build.gradle"
          if [ ! -f "$GRADLE_FILE" ]; then
            GRADLE_FILE="build.gradle"
          fi
          VERSION=$(grep -oP 'versionName\s+["\047]\K[^"\047]+' "$GRADLE_FILE" | head -n1 || true)
          if [ -z "$VERSION" ]; then
            VERSION=$(grep -oP 'version\s+["\047]\K[^"\047]+' "$GRADLE_FILE" | head -n1 || true)
          fi
          if [ -z "$VERSION" ]; then
            VERSION="v0.0.0-$(date +%Y%m%d%H%M%S)"
          fi
          TAG_NAME="v${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Check if tag already exists
        id: tag-check
        run: |
          if git tag -l "${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: steps.tag-check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.tag }}"
          body: |
            ## DualSpaceOBS ${{ steps.version.outputs.tag }}
            **Commit:** `${{ github.sha }}`
            **Branch:** `${{ github.ref_name }}`
            
            *This release was automatically generated by CI.*
          files: artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
